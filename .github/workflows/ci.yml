name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build and test (macOS, Apple Silicon)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build library
        run: cargo build --lib

      - name: Run FFI integration tests
        run: cargo test --test ffi_bindings

      - name: Run library unit tests
        run: cargo test --lib
